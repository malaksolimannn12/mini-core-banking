spring.application.name=mini-core-banking
# ---- MySQL (default) ----
spring.datasource.url=jdbc:mysql://localhost:3306/bank?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:root1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ---- If MySQL is not installed/running yet and you just want the app to boot on Day 1 ----
# uncomment the line below temporarily, then remove it once your DB is ready:
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

server.port=8080